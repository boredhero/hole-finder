[pipeline]
name = "aggressive_cave"
description = "Maximum sensitivity cave/depression detection — loose thresholds, all DEM passes"
passes = [
    "fill_difference",
    "local_relief_model",
    "tpi",
    "curvature",
    "sky_view_factor",
    "morphometric_filter",
]
min_confidence = 0.15

[weights]
fill_difference = 1.5
local_relief_model = 1.5
tpi = 1.0
curvature = 1.0
sky_view_factor = 1.2
morphometric_filter = 0.0

[passes.fill_difference]
min_depth_m = 0.3
min_area_m2 = 20
max_area_m2 = 50000

[passes.local_relief_model]
kernel_sizes = [50, 100, 200]
threshold_m = 0.15
min_area_m2 = 10
max_area_m2 = 50000

[passes.tpi]
threshold = -0.3
radius_m = 15

[passes.curvature]
type = "total"
threshold = -0.005

[passes.sky_view_factor]
radius_m = 30
n_directions = 16
threshold = 0.8
min_area_pixels = 2

[passes.morphometric_filter]
min_depth_m = 0.3
max_area_m2 = 50000
min_circularity = 0.1
