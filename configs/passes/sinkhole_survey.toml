[pipeline]
name = "sinkhole_survey"
description = "Optimized for sinkhole detection — highest recall"
passes = [
    "fill_difference",
    "local_relief_model",
    "tpi",
    "curvature",
    "sky_view_factor",
    "point_density",
    "morphometric_filter",
]
min_confidence = 0.3

[weights]
fill_difference = 1.5
local_relief_model = 1.5
tpi = 1.3
curvature = 0.8
sky_view_factor = 1.0
point_density = 2.0
morphometric_filter = 0.0

[passes.fill_difference]
min_depth_m = 0.5          # Telbisz (2024): 0.5m optimal for 1m LiDAR DEMs
min_area_m2 = 25
max_area_m2 = 50000

[passes.local_relief_model]
kernel_sizes = [50, 100, 200]
threshold_m = 0.4          # Hesse (2010): 0.5m recommended; 0.4 = moderate
min_area_m2 = 25
max_area_m2 = 50000

[passes.tpi]
threshold = -1.0           # Weiss (2001): -1.0 SD = valley/depression class
radius_m = 15
min_area_pixels = 25
max_area_pixels = 5000     # cap huge artifacts (~5000m² at 1m res)

[passes.curvature]
type = "total"
threshold = -0.03          # literature: -0.02 to -0.05 for meaningful concavity
min_area_pixels = 25
max_area_pixels = 5000

[passes.sky_view_factor]
radius_m = 30
n_directions = 16
threshold = 0.65           # Zakšek/Kokalj (2011): 0.65 for enclosed depressions
min_area_pixels = 25
max_area_pixels = 5000

[passes.point_density]
cell_size_m = 2.0
z_score_threshold = -2.0

[passes.morphometric_filter]
min_depth_m = 0.3
max_area_m2 = 50000
min_circularity = 0.15
