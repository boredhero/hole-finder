[pipeline]
name = "mine_detection"
description = "Optimized for mine portal and collapse pit detection"
passes = [
    "fill_difference",
    "local_relief_model",
    "tpi",
    "point_density",
    "multi_return",
    "morphometric_filter",
]
min_confidence = 0.3

[weights]
fill_difference = 1.2
local_relief_model = 1.0
tpi = 1.0
point_density = 1.5
multi_return = 1.3
morphometric_filter = 0.0

[passes.fill_difference]
min_depth_m = 0.5
max_area_m2 = 3000

[passes.local_relief_model]
kernel_sizes = [30, 75, 150]
threshold_m = 0.3

[passes.tpi]
threshold = -1.5
radius_m = 10

[passes.point_density]
cell_size_m = 2.0
z_score_threshold = -2.0

[passes.multi_return]
search_radius_m = 3.0
min_multi_return_ratio = 0.3

[passes.morphometric_filter]
min_depth_m = 0.3
max_area_m2 = 2000
min_circularity = 0.15
