[pipeline]
name = "cave_hunting"
description = "Optimized for cave entrance detection"
passes = [
    "local_relief_model",
    "fill_difference",
    "sky_view_factor",
    "morphometric_filter",
]
min_confidence = 0.4

[weights]
local_relief_model = 1.5
fill_difference = 1.2
sky_view_factor = 1.0
morphometric_filter = 0.0

[passes.local_relief_model]
kernel_sizes = [50, 100, 200]
threshold_m = 1.0
min_area_m2 = 50
max_area_m2 = 5000

[passes.fill_difference]
min_depth_m = 1.0
min_area_m2 = 50
max_area_m2 = 5000

[passes.sky_view_factor]
radius_m = 30
n_directions = 16
threshold = 0.75
min_area_pixels = 10

[passes.morphometric_filter]
min_depth_m = 0.5
min_area_m2 = 100
max_area_m2 = 4000
min_circularity = 0.3
