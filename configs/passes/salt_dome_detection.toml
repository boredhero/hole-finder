[pipeline]
name = "salt_dome_detection"
description = "Optimized for salt dome collapse subsidence detection (Louisiana)"
passes = [
    "fill_difference",
    "tpi",
    "morphometric_filter",
]
min_confidence = 0.4

[weights]
fill_difference = 1.5
tpi = 1.3
morphometric_filter = 0.0

[passes.fill_difference]
min_depth_m = 0.3
min_area_m2 = 500
max_area_m2 = 200000

[passes.tpi]
threshold = -0.5
min_area_pixels = 10

[passes.morphometric_filter]
min_depth_m = 0.3
max_area_m2 = 200000
min_circularity = 0.2
