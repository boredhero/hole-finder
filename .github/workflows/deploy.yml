name: Build and Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # --- Build Frontend ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        working-directory: frontend
        run: npm install -g pnpm && pnpm install && pnpm build

      # --- Build & Push Docker Image ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      # --- Stage files on jumpbox (.69) then forward to .111 ---
      - name: Stage deploy files on jumpbox
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,configs/,nginx/"
          target: /tmp/anomalies-deploy/

      # --- Deploy everything to .111 via jumpbox ---
      - name: Deploy to compute node
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            COMPUTE=noah@192.168.1.111
            SSH_OPTS="-o ConnectTimeout=15 -o StrictHostKeyChecking=no"

            # Create dirs on .111
            ssh $SSH_OPTS $COMPUTE 'mkdir -p ~/anomalies-browser/configs/passes ~/anomalies-browser/configs/regions'

            # Copy compose + configs to .111
            scp $SSH_OPTS /tmp/anomalies-deploy/docker-compose.prod.yml $COMPUTE:~/anomalies-browser/docker-compose.yml
            scp -r $SSH_OPTS /tmp/anomalies-deploy/configs/* $COMPUTE:~/anomalies-browser/configs/

            # Pull image and deploy all services on .111
            ssh $SSH_OPTS $COMPUTE "
              echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u boredhero --password-stdin
              docker pull ghcr.io/boredhero/anomalies-browser:latest
              cd ~/anomalies-browser
              docker compose up -d --force-recreate --remove-orphans
              echo '--- Container status ---'
              docker compose ps
              echo '[compute] Deployed $(date)'
            "

            # Update nginx proxy config on .69
            sudo cp /tmp/anomalies-deploy/nginx/anomalies.martinospizza.dev /etc/nginx/sites-available/anomalies.martinospizza.dev
            sudo ln -sf /etc/nginx/sites-available/anomalies.martinospizza.dev /etc/nginx/sites-enabled/
            sudo nginx -t && sudo systemctl reload nginx

            # Wait for API to come up, then verify
            echo "Waiting for API on .111:9747..."
            for i in 1 2 3 4 5 6; do
              if curl -sf http://192.168.1.111:9747/api/health; then
                echo ""
                echo "[deploy] API healthy!"
                break
              fi
              sleep 10
            done

            # Clean up staging files
            rm -rf /tmp/anomalies-deploy
