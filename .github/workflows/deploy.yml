name: Build and Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Build frontend
        working-directory: frontend
        run: npm install -g pnpm && pnpm install && pnpm build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Stage deploy files on jumpbox
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,configs/,nginx/"
          target: /tmp/anomalies-deploy/

      - name: Deploy to compute node via jumpbox
        uses: appleboy/ssh-action@v2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e

            ssh -o ConnectTimeout=15 -o StrictHostKeyChecking=no noah@192.168.1.111 'mkdir -p ~/anomalies-browser/configs/passes ~/anomalies-browser/configs/regions'

            scp -o StrictHostKeyChecking=no /tmp/anomalies-deploy/docker-compose.prod.yml noah@192.168.1.111:~/anomalies-browser/docker-compose.yml
            scp -r -o StrictHostKeyChecking=no /tmp/anomalies-deploy/configs/* noah@192.168.1.111:~/anomalies-browser/configs/

            ssh -o ConnectTimeout=15 -o StrictHostKeyChecking=no noah@192.168.1.111 "echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u boredhero --password-stdin && docker pull ghcr.io/boredhero/anomalies-browser:latest && cd ~/anomalies-browser && docker compose up -d --force-recreate --remove-orphans && docker compose ps"

            # nginx config managed by certbot — don't overwrite
            # Only reload if config exists and is valid
            sudo nginx -t && sudo systemctl reload nginx || true

            for i in 1 2 3 4 5 6; do
              curl -sf http://192.168.1.111:9747/api/health && echo " [deploy OK]" && break
              sleep 10
            done

            rm -rf /tmp/anomalies-deploy
