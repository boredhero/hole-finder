# Production compose — runs on compute node (192.168.1.111)
# ALL services here: DB, Redis, API, Celery workers, autoheal
# .69 is ONLY an nginx reverse proxy pointing to .111:8000

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: hole-finder-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hole_finder
      POSTGRES_USER: hole_finder
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - hole_finder_pgdata:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - shared_buffers=4GB
      - -c
      - work_mem=256MB
      - -c
      - effective_cache_size=48GB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hole_finder"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hole-finder-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - hole_finder_redis:/data
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru

  api:
    image: ghcr.io/boredhero/hole-finder:latest
    container_name: hole-finder-api
    restart: unless-stopped
    ports:
      - "0.0.0.0:9747:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://hole_finder:${POSTGRES_PASSWORD:-changeme}@db:5432/hole_finder
      REDIS_URL: redis://redis:6379/0
      DATA_DIR: /data/hole-finder
      PROJ_NETWORK: "OFF"
    volumes:
      - ./configs:/app/configs:ro
      - hole_finder_logs:/app/logs
      - /data/hole-finder:/data/hole-finder
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    labels:
      - "autoheal=true"

  celery-worker:
    image: ghcr.io/boredhero/hole-finder:latest
    container_name: hole-finder-worker
    restart: unless-stopped
    command: ["uv", "run", "celery", "-A", "hole_finder.workers.celery_app", "worker",
              "--loglevel=info", "--concurrency=4",
              "-Q", "default,ingest,process,detect"]
    environment:
      DATABASE_URL: postgresql+asyncpg://hole_finder:${POSTGRES_PASSWORD:-changeme}@db:5432/hole_finder
      REDIS_URL: redis://redis:6379/0
      DATA_DIR: /data/hole-finder
      PROJ_NETWORK: "OFF"
    volumes:
      - ./configs:/app/configs:ro
      - hole_finder_logs:/app/logs
      - /data/hole-finder:/data/hole-finder
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery-gpu:
    image: ghcr.io/boredhero/hole-finder:latest
    container_name: hole-finder-gpu-worker
    restart: unless-stopped
    command: ["uv", "run", "celery", "-A", "hole_finder.workers.celery_app", "worker",
              "--loglevel=info", "--concurrency=1", "-Q", "gpu"]
    environment:
      DATABASE_URL: postgresql+asyncpg://hole_finder:${POSTGRES_PASSWORD:-changeme}@db:5432/hole_finder
      REDIS_URL: redis://redis:6379/0
      DATA_DIR: /data/hole-finder
      HSA_OVERRIDE_GFX_VERSION: "10.3.0"
      PROJ_NETWORK: "OFF"
    volumes:
      - ./configs:/app/configs:ro
      - hole_finder_logs:/app/logs
      - /data/hole-finder:/data/hole-finder
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "985"
      - "989"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  autoheal:
    image: willfarrell/autoheal
    container_name: hole-finder-autoheal
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  hole_finder_pgdata:
  hole_finder_redis:
  hole_finder_logs:
